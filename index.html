<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, shrink-to-fit=no">
    <title>ئەنجامی پێشبڕکێ - کۆلێژی پەروەردە</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-purple: #7a28cb;
            --primary-blue: #00d2ff;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-light: #f0f4f8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Kufi Arabic', sans-serif; }

        body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            background-color: #0a0a0a;
            color: var(--text-light);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .animated-bg {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(122, 40, 203, 0.4), transparent 60%),
                        radial-gradient(circle at 80% 20%, rgba(0, 210, 255, 0.4), transparent 50%);
            animation: moveGradient 15s infinite alternate ease-in-out;
            z-index: -1; filter: blur(60px);
        }

        @keyframes moveGradient {
            0% { transform: translate(0, 0); }
            50% { transform: translate(5%, 10%); }
            100% { transform: translate(-5%, -5%); }
        }

        .glass-card {
            background: var(--glass-bg); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 40px 20px;
            width: 92%; max-width: 450px; 
            height: 500px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .logo { width: 90px; height: auto; margin-bottom: 20px; border-radius: 15px; }

        .main-title {
            font-size: 1.2rem;
            color: #d1d5db;
            margin-bottom: 30px;
        }

        .place-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            transition: all 0.5s ease;
        }

        .score-subtitle {
            font-size: 1.1rem;
            color: var(--primary-blue);
            margin-bottom: 40px;
            font-weight: 600;
        }

        .winner-name {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #a3c2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(30px) scale(0.9);
            transition: opacity 0.6s ease, transform 0.6s ease;
            position: absolute;
            bottom: 100px;
            width: 100%;
            text-align: center;
            left: 0;
        }

        .winner-name.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* ڕەنگەکان بۆ پلەکان */
        .place-1 { color: var(--gold); text-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        .place-2 { color: var(--silver); text-shadow: 0 0 15px rgba(192, 192, 192, 0.4); }
        .place-3 { color: var(--bronze); text-shadow: 0 0 15px rgba(205, 127, 50, 0.4); }

    </style>
</head>
<body>

    <div class="animated-bg"></div>

    <div class="glass-card">
        <img src="salahaddin-education-logo.png" alt="لۆگۆی کۆلێژ" class="logo" onerror="this.style.display='none'">
        <div class="main-title">ئەنجامی کۆتایی پێشبڕکێی پرسیار و وەڵام</div>
        
        <div id="placeTitle" class="place-title">چاوەڕێ بن...</div>
        <div id="scoreSubtitle" class="score-subtitle">ئەنجامەکان ڕادەگەیەنرێت</div>
        
        <div id="winnerName" class="winner-name"></div>
    </div>

    <script>
        // داتای ناوەکان و ئەنجامەکان بەپێی داواکارییەکەت
        const results = [
            {
                place: "🥇 پلەی یەکەم",
                placeClass: "place-1",
                score: "ئەوانەی ١٨ لە ٢٠ یان هێناوە",
                names: [
                    "نێرگز کامەران یونس",
                    "نەدا برهان محمد",
                    "شەهلا غەریب مەجید",
                    "شیماء عمر ابراهیم",
                    "ایمان دلیر رسول"
                ]
            },
            {
                place: "🥈 پلەی دووەم",
                placeClass: "place-2",
                score: "ئەوانەی ١٦ لە ٢٠ یان هێناوە",
                names: [
                    "سیما صدام سلیمان",
                    "نور سردار مقصود",
                    "سۆز جلیل عبدالله",
                    "مراز فارس برایم",
                    "مریمخان جبار عزیز"
                ]
            },
            {
                place: "🥉 پلەی سێیەم",
                placeClass: "place-3",
                score: "ئەوانەی ١٤ لە ٢٠ یان هێناوە",
                names: [
                    "ئەلەند یوسف حاجی",
                    "ئەوین پێشرەو ئەبوزێد",
                    "سندس سامان اسماعیل",
                    "هەریاد میوان نامق",
                    "نێرگز محسن محمد",
                    "سۆما قادر اسماعیل",
                    "هۆزان پشتیوان بکر",
                    "ڕۆژین عباس احمد",
                    "ئەڤین عبدالله أحمد",
                    "فەرهاد فاخیر عەلی",
                    "زهراء دلشاد محمد"
                ]
            }
        ];

        let currentCategory = 0;
        let currentName = 0;

        const placeTitle = document.getElementById('placeTitle');
        const scoreSubtitle = document.getElementById('scoreSubtitle');
        const winnerName = document.getElementById('winnerName');

        function showNextName() {
            // ئەگەر هەموو ناوەکان تەواو بوون، لەسەرەتاوە دەست پێ دەکاتەوە یان پەیامێکی کۆتایی دەنووسێت
            if (currentCategory >= results.length) {
                placeTitle.className = 'place-title';
                placeTitle.innerHTML = "پیرۆزە لە هەمووان! 🎉";
                scoreSubtitle.innerHTML = "هیوای سەرکەوتن بۆ گشت لایەک";
                winnerName.innerHTML = "";
                
                // دوای ٥ چرکە دووبارە دەست پێدەکاتەوە
                setTimeout(() => {
                    currentCategory = 0;
                    currentName = 0;
                    showNextName();
                }, 5000);
                return;
            }

            const category = results[currentCategory];
            
            // گۆڕینی تایتڵ و پلەکان
            placeTitle.innerHTML = category.place;
            placeTitle.className = `place-title ${category.placeClass}`;
            scoreSubtitle.innerHTML = category.score;

            // لابردنی ناوی پێشوو بۆ ئەوەی ئەنیمەیشنی دیارنەمان بکات
            winnerName.classList.remove('show');
            
            setTimeout(() => {
                // دانانی ناوی نوێ و نیشاندانی
                winnerName.innerHTML = category.names[currentName];
                winnerName.classList.add('show');
                
                setTimeout(() => {
                    // شاردنەوەی ناوەکە
                    winnerName.classList.remove('show');
                    
                    // ئامادەکردنی ناوی داهاتوو
                    currentName++;
                    if (currentName >= category.names.length) {
                        currentName = 0;
                        currentCategory++;
                    }
                    
                    // کاتی نێوان شاردنەوەی ناوێک و دەرکەوتنی ناوی داهاتوو
                    setTimeout(showNextName, 600); 
                    
                }, 2500); // ئەو کاتەی کە ناوەکە لەسەر شاشە دەمێنێتەوە (٢.٥ چرکە)
            }, 600); // کاتی چاوەڕوانی پێش دەرکەوتنی ناوەکە
        }

        // دەستپێکردنی ئەنیمەیشنەکە دوای ١ چرکە لە کردنەوەی پەڕەکە
        setTimeout(showNextName, 1000);

    </script>
</body>
</html>
